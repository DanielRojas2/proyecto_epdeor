<tbody>
    {% for usuario in usuarios %}
    <tr>
        <td>{{ usuario.nombre }} {{ usuario.apellido_paterno }} {{ usuario.apellido_materno }}</td>
        <td>{{ usuario.ci }}</td>
        <td>{{ usuario.alta|date:"Y-m-d" }}</td>
        <td>{{ usuario.baja|date:"Y-m-d" }}</td>
        <td>{{ usuario.cargo.cargo }}</td>
        <td>{{ usuario.cargo.rol.rol }}</td>
        <td>{{ usuario.estado }}</td>
        <td>
            <button class="btn btn-sm btn-outline-primary me-1" onclick="editarUsuario({{ usuario.id }})">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger" onclick="eliminarUsuario({{ usuario.id }})">
                <i class="bi bi-trash"></i>
            </button>
        </td>
    </tr>
    {% endfor %}
</tbody>
